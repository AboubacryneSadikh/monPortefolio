<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../src/css/output.css">
    <title>Ajouter un Projet</title>
</head>
<body class="bg-[#0d1117] text-[#e6edf3] min-h-screen">

<!-- NAVBAR -->
<nav class="bg-[#161b22] sticky top-0 z-50 border-b border-[#30363d]">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
        <a href="../index.html" class="mono text-[#58a6ff] font-bold text-sm tracking-widest">ASD.</a>
        <a href="lister-projets.html" class="text-sm text-[#8b949e] hover:text-[#58a6ff] transition-colors">← Retour aux projets</a>
    </div>
</nav>

<section class="py-16 px-6">
    <div class="max-w-xl mx-auto">

        <div class="text-center mb-10">
            <p class="mono text-[#58a6ff] text-xs tracking-[0.3em] uppercase mb-3">Nouveau</p>
            <h1 class="text-3xl font-bold mono mb-2">Ajouter un projet</h1>
            <p class="text-[#8b949e] text-sm">Renseigne les informations de ton projet</p>
        </div>

        <div class="bg-[#161b22] border border-[#30363d] rounded-2xl p-8">
            <form action="validForm.html" method="get" class="space-y-5">

                <div>
                    <label class="block text-xs text-[#8b949e] uppercase tracking-widest mb-2 mono">Titre *</label>
                    <input type="text" required
                           placeholder="Ex : Application de gestion de stock"
                           class="w-full bg-[#0d1117] border border-[#30363d] text-white rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-[#58a6ff] transition-colors placeholder-[#30363d]">
                </div>

                <div>
                    <label class="block text-xs text-[#8b949e] uppercase tracking-widest mb-2 mono">Image *</label>
                    <div class="w-full bg-[#0d1117] border border-dashed border-[#30363d] hover:border-[#58a6ff] rounded-lg px-4 py-6 text-center transition-colors cursor-pointer">
                        <input type="file" accept="image/*" required class="w-full text-sm text-[#8b949e] file:mr-4 file:py-1.5 file:px-4 file:rounded file:border-0 file:text-xs file:bg-[#58a6ff] file:text-white hover:file:bg-[#1f6feb] cursor-pointer">
                        <p class="text-xs text-[#8b949e] mt-2">PNG, JPG, WebP — max 5 MB</p>
                    </div>
                </div>

                <div>
                    <label class="block text-xs text-[#8b949e] uppercase tracking-widest mb-2 mono">Description *</label>
                    <textarea rows="4" required
                              placeholder="Décris le projet, ses fonctionnalités, les défis relevés..."
                              class="w-full bg-[#0d1117] border border-[#30363d] text-white rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-[#58a6ff] transition-colors resize-none placeholder-[#30363d]"></textarea>
                </div>

                <div>
                    <label class="block text-xs text-[#8b949e] uppercase tracking-widest mb-2 mono">Technologies</label>
                    <input type="text"
                           placeholder="Ex : Flutter, Laravel, MySQL"
                           class="w-full bg-[#0d1117] border border-[#30363d] text-white rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-[#58a6ff] transition-colors placeholder-[#30363d]">
                </div>

                <button type="submit"
                        class="w-full bg-[#238636] hover:bg-[#2ea043] text-white font-semibold py-3 rounded-lg transition-colors text-sm mt-2">
                    + Ajouter le projet
                </button>

            </form>
        </div>

    </div>
</section>

</body>
</html>
